        body { font-family: Arial, sans-serif; background: #0b1020; color: #fff; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        #lang-selector { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        #lang-selector button { padding: 10px 15px; margin: 0 5px; background: #d4af37; color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #lang-selector button:hover { background: #e8c547; }
        #lang-selector button.active { background: #b8860b; }
        h1 { font-size: 2.8rem; color: #d4af37; }
        h2 { color: #d4af37; margin-top: 30px; }
        h3 { color: #d4af37; }
        .btn { display: inline-block; padding: 15px 35px; background: #d4af37; color: black; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 16px; margin: 15px 10px 15px 0; }
        .btn:hover { background: #e8c547; transform: translateY(-2px); }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; margin: 20px 0; }
        .card ul { margin-left: 20px; margin-top: 10px; }
        .card li { margin: 8px 0; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0; }
        .stat-box { background: #d4af37; color: black; padding: 20px; border-radius: 10px; text-align: center; font-weight: bold; }
        footer { margin-top: 40px; padding: 20px; border-top: 1px solid #d4af37; text-align: center; font-size: 12px; opacity: 0.7; }
        @media (max-width: 768px) { .stats { grid-template-columns: 1fr; } h1 { font-size: 2rem; } #lang-selector { position: relative; top: 0; right: 0; margin-bottom: 20px; } }
    </style>

        function setLanguage(language) {
            localStorage.setItem('preferredLanguage', language);
            translatePage(language);
            updateButtons(language);
        }

        function updateButtons(language) {
            const buttons = document.querySelectorAll('#lang-selector button');
            buttons.forEach(btn => btn.classList.remove('active'));
            document.querySelector(`#lang-selector button[data-lang="${language}"]`).classList.add('active');
        }

        function translatePage(language) {
            const t = translations[language];
            
            document.documentElement.lang = language;
            document.title = t.pageTitle;
            document.getElementById('mainHeading').textContent = t.mainHeading;
            document.getElementById('subheading').textContent = t.subheading;
            document.getElementById('intro1').textContent = t.intro1;
            document.getElementById('intro2').textContent = t.intro2;
            document.getElementById('consultationBtn').textContent = t.consultationBtn;
            document.getElementById('contactBtn').textContent = t.contactBtn;
            document.getElementById('whyChooseTitle').textContent = t.whyChoose;
            document.getElementById('whyChooseList').innerHTML = t.whyChooseItems.map(item => `<li>${item}</li>`).join('');
            document.getElementById('trackRecordTitle').textContent = t.trackRecord;
            document.getElementById('trackRecord1').textContent = t.trackRecord1;
            document.getElementById('trackRecord2').textContent = t.trackRecord2;
            document.getElementById('servicesTitle').textContent = t.services;
            document.getElementById('servicesList').innerHTML = t.servicesItems.map(item => `<li>${item}</li>`).join('');
            document.getElementById('whyMatterTitle').textContent = t.whyMatter;
            document.getElementById('whyMatter1').textContent = t.whyMatter1;
            document.getElementById('whyMatter2').textContent = t.whyMatter2;
            document.getElementById('statsTitle').textContent = t.stats;
            document.getElementById('statsExp').textContent = t.statsExperience;
            document.getElementById('statsSuc').textContent = t.statsSuccess;
            document.getElementById('statsFam').textContent = t.statsFamilies;
            document.getElementById('testimonialsTitle').textContent = t.testimonials;
            document.getElementById('testimonial1').textContent = t.testimonial1;
            document.getElementById('testimonial2').textContent = t.testimonial2;
            document.getElementById('testimonial3').textContent = t.testimonial3;
            document.getElementById('readyHeading').textContent = t.readyHeading;
            document.getElementById('readyText').textContent = t.readyText;
            document.getElementById('getStartedBtn').textContent = t.getStartedBtn;
            document.getElementById('footer').innerHTML = `<p>${t.footer}</p><p>${t.footerDisclaimer}</p>`;
        }

        function initLanguage() {
            const userLang = navigator.language || navigator.userLanguage;
            const lang = localStorage.getItem('preferredLanguage') || (userLang.startsWith('es') ? 'es' : 'en');
            setLanguage(lang);
        }

        window.addEventListener('DOMContentLoaded', initLanguage);
