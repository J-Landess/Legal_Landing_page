<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Landing Page</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #lang-selector { position: absolute; top: 20px; right: 20px; }
    </style>
    <script>
        const translations = {
            en: {
                title: 'Welcome to the Legal Landing Page',
                content: 'This page provides legal information and resources.'
            },
            es: {
                title: 'Bienvenido a la Página de Aterrizaje Legal',
                content: 'Esta página proporciona información y recursos legales.'
            }
        };

        function setLanguage(language) {
            localStorage.setItem('lang', language);
            translatePage(language);
        }

        function translatePage(language) {
            document.title = translations[language].title;
            document.getElementById('content').innerText = translations[language].content;
        }

        function initLanguage() {
            const userLang = navigator.language || navigator.userLanguage;
            const lang = localStorage.getItem('lang') || (userLang.startsWith('es') ? 'es' : 'en');
            setLanguage(lang);
        }

        document.addEventListener('DOMContentLoaded', initLanguage);
    </script>
</head>
<body>
    <div id="lang-selector">
        <button onclick="setLanguage('en')">English</button>
        <button onclick="setLanguage('es')">Español</button>
    </div>
    <h1 id="title"></h1>
    <div id="content"></div>
</body>
</html>
