<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Immigration Consultation - Immigration Attorney</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        .language-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .language-toggle button {
            padding: 10px 15px;
            margin: 0 5px;
            background: #d4af37;
            color: #16213e;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .language-toggle button.active {
            background: #e8c547;
            transform: scale(1.05);
        }

        .language-toggle button:hover {
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        .form-container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .form-container h1 {
            color: #16213e;
            font-size: 2.5rem;
            margin-bottom: 10px;
            border-bottom: 3px solid #d4af37;
            padding-bottom: 15px;
            display: inline-block;
        }

        .form-container p {
            color: #666;
            font-size: 1.1rem;
            margin: 15px 0 30px 0;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            display: block;
            color: #16213e;
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button[type="submit"] {
            padding: 15px;
            background: linear-gradient(135deg, #d4af37 0%, #b8941c 100%);
            color: #16213e;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            width: 100%;
            margin-top: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        button[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.6);
            background: linear-gradient(135deg, #e8c547 0%, #d4af37 100%);
        }

        .disclaimer {
            font-size: 0.85rem;
            color: #999;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
            line-height: 1.6;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #16213e;
        }

        @media (max-width: 768px) {
            .form-container {
                margin: 20px;
                padding: 25px;
            }

            .form-container h1 {
                font-size: 2rem;
            }

            .language-toggle {
                top: 10px;
                right: 10px;
            }

            .language-toggle button {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="language-toggle">
        <button class="active" onclick="setLanguage('en')">English</button>
        <button onclick="setLanguage('es')">Español</button>
    </div>

    <div class="form-container">
        <h1><span data-en="📋 Free Consultation" data-es="📋 Consulta Gratuita"></span></h1>
        <p><span data-en="Tell us about your immigration case and we'll respond quickly with a comprehensive evaluation." data-es="Cuéntanos sobre tu caso de inmigración y te responderemos rápidamente con una evaluación integral."></span></p>

        <form action="https://formspree.io/f/meevoldo" method="POST">
            <label for="name"><span data-en="Your Name *" data-es="Tu Nombre *"></span></label>
            <input type="text" id="name" name="name" placeholder="" required data-en-placeholder="Full Name" data-es-placeholder="Nombre Completo">

            <label for="email"><span data-en="Your Email *" data-es="Tu Correo Electrónico *"></span></label>
            <input type="email" id="email" name="email" placeholder="" required data-en-placeholder="Email Address" data-es-placeholder="Dirección de Correo Electrónico">

            <label for="phone"><span data-en="Phone Number *" data-es="Número de Teléfono *"></span></label>
            <input type="tel" id="phone" name="phone" placeholder="" required data-en-placeholder="(555) 123-4567" data-es-placeholder="(555) 123-4567">

            <label for="case-type"><span data-en="What is your immigration case about? *" data-es="¿Sobre qué trata tu caso de inmigración? *"></span></label>
            <select id="case-type" name="case-type" required>
                <option value="" data-en="-- Select Case Type --" data-es="-- Selecciona Tipo de Caso --"></option>
                <option value="green-card" data-en="Green Card Application" data-es="Solicitud de Tarjeta Verde"></option>
                <option value="spousal-sponsorship" data-en="Spousal Sponsorship (K-1 Visa)" data-es="Patrocinio Conyugal (Visa K-1)"></option>
                <option value="expedited-processing" data-en="Expedited Processing" data-es="Procesamiento Acelerado"></option>
                <option value="deportation-defense" data-en="Deportation Defense" data-es="Defensa Contra Deportación"></option>
                <option value="daca" data-en="DACA Application" data-es="Solicitud de DACA"></option>
                <option value="tps" data-en="Temporary Protected Status (TPS)" data-es="Estado de Protección Temporal (TPS)"></option>
                <option value="naturalization" data-en="Naturalization/Citizenship" data-es="Naturalización/Ciudadanía"></option>
                <option value="family-reunification" data-en="Family Reunification" data-es="Reunificación Familiar"></option>
                <option value="other" data-en="Other" data-es="Otro"></option>
            </select>

            <label for="case"><span data-en="Describe Your Case *" data-es="Describe Tu Caso *"></span></label>
            <textarea id="case" name="case" placeholder="" required data-en-placeholder="Please provide details about your immigration situation, timeline, and any concerns..." data-es-placeholder="Por favor, proporciona detalles sobre tu situación de inmigración, cronología y cualquier preocupación..."></textarea>

            <button type="submit"><span data-en="Get Your Free Consultation" data-es="Obtén Tu Consulta Gratuita"></span></button>
        </form>

        <p class="disclaimer">
            <strong><span data-en="Disclaimer:" data-es="Descargo de Responsabilidad:"></span></strong> <span data-en="Submitting this form does not create an attorney-client relationship. This is a confidential consultation request only. Do not include sensitive information such as Social Security numbers, financial accounts, or passwords." data-es="Enviar este formulario no crea una relación abogado-cliente. Esta es solo una solicitud de consulta confidencial. No incluyas información sensible como números de Seguro Social, cuentas financieras o contraseñas."></span>
        </p>

        <a href="index.html" class="back-link"><span data-en="← Back to Home" data-es="← Volver al Inicio"></span></a>
    </div>

    <script>
        const translations = {
            en: {
                title: "Free Consultation",
                description: "Tell us about your immigration case and we'll respond quickly with a comprehensive evaluation.",
                nameLabel: "Your Name *",
                emailLabel: "Your Email *",
                phoneLabel: "Phone Number *",
                caseTypeLabel: "What is your immigration case about? *",
                caseDescLabel: "Describe Your Case *",
                submitBtn: "Get Your Free Consultation",
                backLink: "← Back to Home",
                disclaimer: "Disclaimer:",
                disclaimerText: "Submitting this form does not create an attorney-client relationship. This is a confidential consultation request only. Do not include sensitive information such as Social Security numbers, financial accounts, or passwords."
            },
            es: {
                title: "Consulta Gratuita",
                description: "Cuéntanos sobre tu caso de inmigración y te responderemos rápidamente con una evaluación integral.",
                nameLabel: "Tu Nombre *",
                emailLabel: "Tu Correo Electrónico *",
                phoneLabel: "Número de Teléfono *",
                caseTypeLabel: "¿Sobre qué trata tu caso de inmigración? *",
                caseDescLabel: "Describe Tu Caso *",
                submitBtn: "Obtén Tu Consulta Gratuita",
                backLink: "← Volver al Inicio",
                disclaimer: "Descargo de Responsabilidad:",
                disclaimerText: "Enviar este formulario no crea una relación abogado-cliente. Esta es solo una solicitud de consulta confidencial. No incluyas información sensible como números de Seguro Social, cuentas financieras o contraseñas."
            }
        };

        function setLanguage(lang) {
            // Update active button
            document.querySelectorAll('.language-toggle button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update all elements with data attributes
            document.querySelectorAll('[data-en][data-es]').forEach(el => {
                el.textContent = el.getAttribute(`data-${lang}`);
            });

            // Update placeholders
            document.querySelectorAll(`[data-${lang}-placeholder]`).forEach(el => {
                el.placeholder = el.getAttribute(`data-${lang}-placeholder`);
            });

            // Store language preference
            localStorage.setItem('language', lang);
        }

        // Load saved language preference on page load
        window.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('language') || 'en';
            document.querySelectorAll('.language-toggle button').forEach((btn, index) => {
                btn.classList.toggle('active', (savedLang === 'en' && index === 0) || (savedLang === 'es' && index === 1));
            });
            setLanguage(savedLang);
        });
    </script>
</body>
</html>
