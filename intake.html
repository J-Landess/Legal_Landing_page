<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intake Form</title>
    <script>
        // Function to load preferred language from localStorage
        function loadLanguage() {
            const language = localStorage.getItem('preferredLanguage');
            if (language === 'es') {
                document.getElementById('formTitle').textContent = 'Formulario de Ingreso';
                document.getElementById('nameLabel').textContent = 'Nombre';
                document.getElementById('submitBtn').textContent = 'Enviar';
                // Add more translations as needed
            } else {
                document.getElementById('formTitle').textContent = 'Intake Form';
                document.getElementById('nameLabel').textContent = 'Name';
                document.getElementById('submitBtn').textContent = 'Submit';
                // Add more translations as needed
            }
        }

        window.onload = loadLanguage;
    </script>
</head>
<body>
    <h1 id="formTitle"></h1>
    <form>
        <label id="nameLabel" for="name"></label>
        <input type="text" id="name" name="name" required>
        <button type="submit" id="submitBtn"></button>
    </form>
</body>
</html>
