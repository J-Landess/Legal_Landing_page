<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Intake - J-Landess Immigration Law</title>

    <link rel="stylesheet" href="styles.css">

    <script>
        const translations = {
            en: {
                formTitle: "📋 Client Intake Form",
                name: "Full Name",
                email: "Email",
                phone: "Phone Number",
                caseType: "Case Type",
                details: "Describe Your Situation",
                submit: "Submit Consultation Request",
                note: "We will contact you within 24 hours."
            },
            es: {
                formTitle: "📋 Formulario de Cliente",
                name: "Nombre Completo",
                email: "Correo Electrónico",
                phone: "Número de Teléfono",
                caseType: "Tipo de Caso",
                details: "Describe Tu Situación",
                submit: "Enviar Solicitud",
                note: "Nos pondremos en contacto con usted dentro de 24 horas."
            }
        };

        function loadLanguage() {
            const lang = localStorage.getItem('preferredLanguage') || 'en';
            const t = translations[lang];

            document.getElementById('formTitle').textContent = t.formTitle;
            document.getElementById('nameLabel').textContent = t.name;
            document.getElementById('emailLabel').textContent = t.email;
            document.getElementById('phoneLabel').textContent = t.phone;
            document.getElementById('caseTypeLabel').textContent = t.caseType;
            document.getElementById('detailsLabel').textContent = t.details;
            document.getElementById('submitBtn').textContent = t.submit;
            document.getElementById('formNote').textContent = t.note;
        }

        window.addEventListener('DOMContentLoaded', loadLanguage);
    </script>
</head>
<body>

    <div id="lang-selector">
        <button onclick="localStorage.setItem('preferredLanguage','en'); location.reload()">English</button>
        <button onclick="localStorage.setItem('preferredLanguage','es'); location.reload()">Español</button>
    </div>

    <div class="container">

        <h1 id="formTitle"></h1>

        <div class="card">
            <form action="https://formspree.io/f/meevoldo" method="POST">

                <div class="form-group">
                    <label id="nameLabel" for="name"></label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label id="emailLabel" for="email"></label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label id="phoneLabel" for="phone"></label>
                    <input type="tel" id="phone" name="phone">
                </div>

                <div class="form-group">
                    <label id="caseTypeLabel" for="caseType"></label>
                    <select id="caseType" name="caseType">
                        <option>Green Card</option>
                        <option>Spousal Visa</option>
                        <option>Deportation Defense</option>
                        <option>DACA</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label id="detailsLabel" for="details"></label>
                    <textarea id="details" name="details"></textarea>
                </div>

                <input type="hidden" name="_subject" value="New Immigration Intake Submission">

                <button type="submit" class="btn" id="submitBtn"></button>

                <p class="form-note" id="formNote"></p>

            </form>
        </div>

        <footer>
            © 2026 J-Landess Immigration Law Group. All rights reserved.
        </footer>

    </div>

</body>
</html>
